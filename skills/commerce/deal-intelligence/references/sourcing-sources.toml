# Sourcing Sources — Structured Metadata
#
# Machine-readable catalog of all sourcing channels referenced in
# sourcing-guide.md. Each entry uses [[source]] array-of-tables syntax.
#
# Attribute reference:
#   name              = display name
#   url               = primary URL
#   type              = "auction" | "fixed-price" | "marketplace" | "price-history" | "aggregator" | "directory" | "direct-seller" | "free-gifting" | "service-referral"
#   auction_type      = "timed" | "sealed-bid" | "live" | "ascending" | "live+online" | "none"
#   buy_it_now        = true if fixed-price/BIN option exists alongside auctions
#   api               = true if a public API is available
#   government_level  = "federal" | "state" | "local" | "none"
#   categories        = array of product categories
#   condition         = array of condition grades: "new", "refurbished", "open-box", "used", "salvage", "as-is", "mixed"
#   buyer_premium     = string (e.g. "0%", "7.5-12.5%", "varies")
#   online            = true if bidding/buying is online
#   in_person         = true if in-person attendance or inspection is available
#   local_pickup      = true if local pickup is required or available
#   ships             = true if shipping is available
#   sold_price_history= true if past sold prices are viewable
#   notes             = short note
#
# Used by: shopping-deal-intelligence skill, sourcing phase
# Companion to: sourcing-guide.md (human-readable strategy and context)

