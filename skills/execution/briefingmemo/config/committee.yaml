      model: "sonnet-4.6"
      expertise_file: "expertise/philanthropy_expertise.md"
      
    - name: "Environmental Agent"
      model: "sonnet-4.6"
      expertise_file: "expertise/environmental_expertise.md"

deliberation:
  protocol: "situational-analysis"
  conflict_resolution: "strategic-alignment"
  time_limit_minutes: 5
  budget_limit_dollars: 5
  response_order: "alphabetical"
  speaking_turns: "round_robin"
  tie_breaking: "cso_vote"
  
research_phase:
  enabled: true
  research_agents:
    - "Data Scientist"
    - "Market Analyst"
    - "Industry Analyst"
  max_research_time_minutes: 10
  
output:
  memo_template: "assets/memo_templates/standard_memo.md"
  include_transcript: true
  include_research_package: true
  include_post_decision_review: true
  dynamic_sections: true
  committee_templates:
    - "leadership-council"
    - "management-council"
    - "executive-strategy-committee"
    - "legendary-ceos"
